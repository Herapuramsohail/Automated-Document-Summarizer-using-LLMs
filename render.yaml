services:
  - type: web
    name: document-summarizer-api
    runtime: python
    region: oregon
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./document_summarizer.db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: VECTOR_DB_DIR
        value: ./vector_indices
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
    disk:
      name: app-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
