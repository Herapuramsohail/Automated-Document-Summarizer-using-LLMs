version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - vector_data:/app/vector_indices
      - db_data:/app/db
    environment:
      - DATABASE_URL=sqlite:///./db/document_summarizer.db
      - UPLOAD_DIR=./uploads
      - VECTOR_DB_DIR=./vector_indices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads_data:
  vector_data:
  db_data:
